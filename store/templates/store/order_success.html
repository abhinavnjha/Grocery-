{% extends "store/base.html" %}
{% block content %}
<div class="success-page">
  <span class="success-icon">🎉</span>
  <h1>Order Placed!</h1>
  <p>Thank you, {{ order.full_name }}. Your order <strong>#{{ order.id }}</strong> has been received.</p>
  <p>Our delivery partner will reach you at <strong>{{ order.phone }}</strong> soon.</p>
  <div class="success-total">Total to pay on delivery: <strong>₹{{ order.total }}</strong></div>
  <a href="{% url 'shop' %}" class="btn btn-primary btn-lg">Continue Shopping</a>
</div>
{% endblock %}
